<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Moon Phase Widget (Safe Embed Version)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif&display=swap" rel="stylesheet">
  <style>
    .widget-wrapper {
      font-family: 'Noto Serif', serif;
      background-color: #f5f3eb;
      background-image: radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 1px);
      background-size: 20px 20px;
      color: #333;
      text-align: center;
      padding: 2em;
      border: 1px solid #ddd;
      border-radius: 12px;
      max-width: 320px;
      margin: 0 auto;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }
    .moon-icon {
      font-size: 3em;
      margin-bottom: 0.3em;
    }
    .moon-prefix {
      font-size: 1.1em;
      color: #666;
    }
    .moon-label {
      font-size: 1.4em;
      font-weight: bold;
      margin-bottom: 0.5em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .moon-advice {
      font-size: 0.9em;
      color: #555;
      line-height: 1.5;
      margin-top: 1em;
    }
    .noscript-note {
      font-size: 0.85em;
      color: #888;
      margin-top: 1em;
    }

    /* レスポンシブ対応 */
    @media (max-width: 360px) {
      .widget-wrapper {
        max-width: 90vw;
        padding: 1.5em;
      }
      .moon-label {
        font-size: 1.2em;
      }
    }
  </style>
</head>
<body>
  <div class="widget-wrapper">
    <div class="moon-icon" id="moonIcon">🌙</div>
    <div class="moon-prefix">今日は</div>
    <div class="moon-label" id="moonLabel">…</div>
    <div class="moon-advice" id="moonAdvice"></div>
    <noscript>
      <div class="noscript-note">JavaScriptを有効にすると、今日の月齢が表示されます。</div>
    </noscript>
  </div>
  <script>
    function getMoonAge() {
      const today = new Date();
      // 基準となる新月時刻はUTC（2000-01-06 18:14 UTC）。
      // 末尾の'Z'がないと閲覧者のローカル時刻として解釈され、月齢がずれる。
      const knownNewMoon = new Date('2000-01-06T18:14:00Z');
      const synodicMonth = 29.530588;
      const days = (today - knownNewMoon) / (1000 * 60 * 60 * 24);
      return (days % synodicMonth);
    }
    // 月の和名は旧暦の日付に基づく（旧暦日 ≈ 月齢 + 1）。
    // 各名前の基準月齢がその区間に収まるように境界を設定している。
    // 旧暦日 d はおおむね月齢 (d-1)〜d に対応する。
    // 満月のみ、日送り（約1.03/日）で表示がスキップされないよう1日以上の幅を確保。
    function getMoonData(age) {
      if (age < 1.0)  return ['🌑', '新月（しんげつ）', '静かな始まりの日。意図を立てるのに最適。'];
      if (age < 2.0)  return ['🌒', '二日月（ふつかづき）', 'ゆっくりと身体と心を目覚めさせて。'];
      if (age < 3.0)  return ['🌒', '三日月（みかづき）', '小さなスタートを大切に。'];
      if (age < 4.0)  return ['🌒', '四日月（よっかづき）', '芽吹きを育てる時期。'];
      if (age < 5.0)  return ['🌒', '五日月（いつかづき）', '少しずつ光が増える時。積み重ねを楽しんで。'];
      if (age < 6.0)  return ['🌒', '六日月（むいかづき）', '半月へ向かう途中。ペースを整えて。'];
      if (age < 7.0)  return ['🌒', '七日月（なのかづき）', '気持ちを信じて進んで。'];
      if (age < 8.0)  return ['🌓', '上弦の月（じょうげんのつき）', '迷いが出やすい時。方向性を見直すチャンス。'];
      if (age < 9.0)  return ['🌔', '九日月（ここのかづき）', '膨らみはじめる月とともに、少しずつ前へ。'];
      if (age < 10.0) return ['🌔', '十日夜の月（とおかんやのつき）', '形になりはじめる時。'];
      if (age < 12.0) return ['🌔', '十日余りの月（とおかあまりのつき）', '満ちる手前の充実期。仕上げを意識して。'];
      if (age < 13.0) return ['🌔', '十三夜（じゅうさんや）', 'ほぼ満ちた今を味わって。'];
      if (age < 14.0) return ['🌔', '小望月（こもちづき）', '満ちゆく中で、自分を信じて進んで。'];
      if (age < 15.8) return ['🌕', '満月（まんげつ）', 'エネルギーのピーク。手放しを意識して。'];
      if (age < 16.8) return ['🌖', '十六夜（いざよい）', '少しずつ整える。焦らず、自分のペースで。'];
      if (age < 17.8) return ['🌖', '立待月（たちまちづき）', '焦らず、自分のリズムで。'];
      if (age < 18.8) return ['🌖', '居待月（いまちづき）', 'ゆったりと、自分をいたわる時間。'];
      if (age < 19.8) return ['🌖', '寝待月（ねまちづき）', '心身を緩め、静けさを意識して。'];
      if (age < 21.3) return ['🌖', '更待月（ふけまちづき）', '整える時。無理せず休息を。'];
      if (age < 23.3) return ['🌗', '下弦の月（かげんのつき）', '振り返りに適したタイミング。内省を大切に。'];
      if (age < 28.5) return ['🌘', '有明の月（ありあけのつき）', '深い休息を。次の新月へ備えて。'];
      return ['🌘', '三十日月（みそかづき）', 'ひとつのサイクルを静かに閉じ、新たな準備を。'];
    }
    const age = getMoonAge();
    const [icon, label, advice] = getMoonData(age);
    document.getElementById('moonIcon').textContent = icon;
    document.getElementById('moonLabel').textContent = label;
    document.getElementById('moonAdvice').textContent = advice;
  </script>
</body>
</html>
